<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Season2 Songyeon VR</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:#000;
}

#panorama{
  width:100%;
  height:100%;
}

.sceneTitle{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  z-index:1000;
  padding:12px 25px;
  background:rgba(0,0,0,.55);
  color:white;
  font-size:22px;
  font-weight:bold;
  border-radius:30px;
}

.bigArrow{
  width:90px !important;
  height:90px !important;
  border-radius:50% !important;
  background:white !important;
  color:black !important;
  display:flex !important;
  justify-content:center !important;
  align-items:center !important;
  font-size:55px !important;
  font-weight:bold !important;
  border:4px solid rgba(0,0,0,.25) !important;
  box-shadow:0 0 25px rgba(0,0,0,.65) !important;
  cursor:pointer !important;
}

.pnlm-tooltip{
  display:none !important;
}

@media(max-width:768px){
  .bigArrow{
    width:160px !important;
    height:160px !important;
    font-size:100px !important;
  }
}
</style>
</head>

<body>

<div class="sceneTitle" id="title">VR1 거리 접근</div>
<div id="panorama"></div>

<script>
var titles = {
  vr01:"VR1 거리 접근",
  vr02:"VR2 지하 입구",
  vr03:"VR3 메인 공간",
  vr04:"VR4 라운지/미니바",
  vr05:"VR5 창문/출입구"
};

function nextArrow(div){
  div.className += " bigArrow";
  div.innerHTML = "➜";
}

function backArrow(div){
  div.className += " bigArrow";
  div.innerHTML = "◀";
}

var viewer = pannellum.viewer("panorama", {
  "default":{
    "firstScene":"vr01",
    "sceneFadeDuration":1000,
    "autoLoad":true,
    "hfov":120
  },

  "scenes":{
    "vr01":{
      "panorama":"images/vr01_street_approach.png",
      "yaw":145,
      "pitch":-12,
      "hfov":120,
      "hotSpots":[
        {
          "pitch":-18,
          "yaw":100,
          "type":"scene",
          "sceneId":"vr02",
          "createTooltipFunc":nextArrow
        }
      ]
    },

    "vr02":{
      "panorama":"images/vr02_basement_entry.png",
      "hotSpots":[
        {
          "pitch":-15,
          "yaw":0,
          "type":"scene",
          "sceneId":"vr03",
          "createTooltipFunc":nextArrow
        },
        {
          "pitch":-15,
          "yaw":180,
          "type":"scene",
          "sceneId":"vr01",
          "createTooltipFunc":backArrow
        }
      ]
    },

    "vr03":{
      "panorama":"images/vr03_main_hall.png",
      "hotSpots":[
        {
          "pitch":-15,
          "yaw":40,
          "type":"scene",
          "sceneId":"vr04",
          "createTooltipFunc":nextArrow
        },
        {
          "pitch":-15,
          "yaw":180,
          "type":"scene",
          "sceneId":"vr02",
          "createTooltipFunc":backArrow
        }
      ]
    },

    "vr04":{
      "panorama":"images/vr04_lounge_bar.png",
      "hotSpots":[
        {
          "pitch":-15,
          "yaw":-40,
          "type":"scene",
          "sceneId":"vr05",
          "createTooltipFunc":nextArrow
        },
        {
          "pitch":-15,
          "yaw":180,
          "type":"scene",
          "sceneId":"vr03",
          "createTooltipFunc":backArrow
        }
      ]
    },

    "vr05":{
      "panorama":"images/vr05_window_exit.png",
      "hotSpots":[
        {
          "pitch":-15,
          "yaw":180,
          "type":"scene",
          "sceneId":"vr04",
          "createTooltipFunc":backArrow
        }
      ]
    }
  }
});

viewer.on("scenechange", function(sceneId){
  document.getElementById("title").innerHTML = titles[sceneId];
});
</script>

</body>
</html>
